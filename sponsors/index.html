<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>榮譽贊助夥伴 — 社團法人台灣人車公益協會</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0b0f;color:#fff;font-family:'Noto Sans TC',sans-serif;line-height:1.6;min-height:100vh;}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(10,11,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid #1a1c24;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo img{height:38px;width:38px;object-fit:contain;flex-shrink:0;}
.nav-logo span{font-size:13px;font-weight:700;color:#fff;letter-spacing:1px;}
.nav-links{display:flex;align-items:center;gap:8px;}
.nav-links a{font-size:12px;color:#aaa;text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .2s;}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.06);}
.nav-btn{background:linear-gradient(135deg,#e8a020,#d4821a)!important;color:#000!important;font-weight:700!important;border-radius:7px!important;}
.nav-donate{background:rgba(109,204,138,.15)!important;border:1px solid rgba(109,204,138,.5)!important;color:#6dcc8a!important;font-weight:700!important;border-radius:7px!important;}
/* HAMBURGER */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none;}
.hamburger span{display:block;width:22px;height:2px;background:#aaa;border-radius:2px;transition:all .3s;}
.mobile-menu{display:none;flex-direction:column;background:#111318;border-bottom:1px solid #1a1c24;padding:12px 20px 16px;}
.mobile-menu a,.mobile-menu button{display:block;padding:10px 0;font-size:14px;color:#aaa;text-decoration:none;background:none;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600;text-align:left;width:100%;}
.mobile-menu a:hover,.mobile-menu button:hover{color:#e8a020;}
.mobile-menu .m-btn{margin-top:8px;padding:11px 16px;background:linear-gradient(135deg,#e8a020,#d4821a);color:#000;border-radius:8px;font-weight:700;text-align:center;}
.mobile-menu .m-donate{margin-top:8px;padding:11px 16px;background:rgba(109,204,138,.15);border:1px solid rgba(109,204,138,.4);color:#6dcc8a;border-radius:8px;font-weight:700;text-align:center;display:block;}
@media(max-width:640px){
  .nav-links{display:none;}
  .hamburger{display:flex;}
}

/* HERO BANNER */
.page-hero{padding:48px 24px 36px;text-align:center;background:linear-gradient(180deg,rgba(232,160,32,.04) 0%,transparent 100%);border-bottom:1px solid #1a1c24;}
.page-badge{display:inline-block;background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.4);color:#e8a020;font-size:11px;font-weight:700;padding:5px 16px;border-radius:20px;letter-spacing:3px;margin-bottom:16px;}
.page-hero h1{font-size:clamp(22px,5vw,40px);font-weight:900;margin-bottom:8px;}
.page-hero p{font-size:13px;color:#888;max-width:520px;margin:0 auto;}

/* SPONSOR CARD */
.sponsor-section{max-width:960px;margin:0 auto;padding:32px 20px 60px;}
.sponsor-card{background:#111318;border:1px solid #1e2029;border-radius:20px;overflow:hidden;}

/* TOP STRIP */
.card-top{background:linear-gradient(135deg,#1a0505 0%,#1a0a0a 100%);border-bottom:1px solid #2a1515;padding:20px 24px;display:flex;align-items:center;gap:16px;}
.card-logo{width:60px;height:60px;object-fit:contain;border-radius:10px;flex-shrink:0;}
.card-title-block h2{font-size:20px;font-weight:900;color:#fff;}
.card-title-block .en{font-size:11px;color:#888;letter-spacing:2px;margin-top:1px;}
.badge-sponsor{background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.5);color:#e8a020;font-size:10px;font-weight:700;padding:2px 9px;border-radius:12px;letter-spacing:1px;margin-top:5px;display:inline-block;}

/* CARD BODY — flex row-reverse: video right on desktop, video top on mobile */
.card-body{display:flex;flex-direction:row-reverse;}

/* RIGHT VIDEO */
.card-video{flex:0 0 300px;background:#000;display:flex;align-items:center;justify-content:center;}
.card-video video{width:100%;aspect-ratio:716/1284;object-fit:contain;display:block;}

/* LEFT INFO */
.card-info{flex:1;padding:20px 22px;display:flex;flex-direction:column;gap:0;}
.section-label{font-size:10px;color:#555;letter-spacing:3px;font-weight:700;margin-bottom:10px;text-transform:uppercase;}
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px;}
.store-chip{background:#13151f;border:1px solid #252830;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:7px;}
.store-chip .dot{width:5px;height:5px;background:#e8a020;border-radius:50%;flex-shrink:0;}
.store-chip span{font-size:12px;font-weight:600;}
.info-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1a1c24;}
.info-row:last-child{border-bottom:none;}
.info-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.info-label{font-size:10px;color:#555;margin-bottom:1px;}
.info-val{font-size:13px;font-weight:600;}
.info-val a{color:#fff;text-decoration:none;}
.info-val a:hover{color:#e8a020;}
.web-placeholder{color:#444;font-size:12px;font-style:italic;}

/* MOBILE */
@media(max-width:700px){
  .card-body{flex-direction:column;}
  .card-video{flex:none;width:100%;}
  .card-video video{width:100%;aspect-ratio:716/1284;}
  .card-info{padding:16px 18px;}
  .card-top{padding:16px 18px;}
}

/* FOOTER */
footer{border-top:1px solid #1a1c24;padding:24px;text-align:center;}
footer p{font-size:12px;color:#444;}
footer a{color:#666;text-decoration:none;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:#888;font-size:13px;text-decoration:none;margin-bottom:20px;transition:color .2s;}
.back-link:hover{color:#e8a020;}
</style>
</head>

<script>

</script>
